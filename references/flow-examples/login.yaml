appId: ${APP_ID}
tags:
  - smoke
  - auth
---
# Credentials come from env vars supplied at run time only.
# The skill never stores them. Set them in your shell, or let the skill
# prompt for them per run; either way they leave no persistent trace.

- openLink: ${PROJECT_URL}
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*Log In.*"
    timeout: 120000

# Adapt these selectors to the app's actual login screen.
# Prefer testID / accessibilityLabel selectors when you can; fall back to
# regex text matching because React Native bundles sibling Text into one
# parent accessibilityText (see references/writing-flows.md).
- tapOn:
    id: "email_input"
- inputText: ${MAESTRO_USERNAME}
- hideKeyboard

- tapOn:
    id: "password_input"
- inputText: ${MAESTRO_PASSWORD}
- hideKeyboard

- tapOn:
    text: "Log In"
- extendedWaitUntil:
    visible:
      text: ".*${HOME_SCREEN_TEXT}.*"
    timeout: 30000
- takeScreenshot: post-login
