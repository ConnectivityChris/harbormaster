appId: ${APP_ID}
tags:
  - smoke
  - navigation
---
# Assumes the app reaches a home/root screen with a list (e.g. conversations,
# inbox, feed) on launch. If your app requires login first, prepend a
# `runFlow: login.yaml` step instead of `launchApp`.

- launchApp
- waitForAnimationToEnd

- assertVisible: "${LIST_HEADING}"
- assertVisible:
    id: "${LIST_TEST_ID}"
- takeScreenshot: list-view

# Open the first item in the list and verify the detail screen renders.
- tapOn:
    id: "${LIST_FIRST_ITEM_ID}"
- waitForAnimationToEnd
- assertVisible: "${DETAIL_SCREEN_MARKER}"
- takeScreenshot: detail-view

- back
- assertVisible: "${LIST_HEADING}"
