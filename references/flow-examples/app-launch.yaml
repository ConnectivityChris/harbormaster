appId: ${APP_ID}
tags:
  - smoke
---
# APP_ID is supplied at run time (see references/writing-flows.md):
#   - host.exp.Exponent      Expo Go on iOS
#   - host.exp.exponent      Expo Go on Android
#   - <your bundle id>       native dev build / TestFlight / store build
#
# This flow defaults to the native dev-build path (launchApp clearState).
# For Expo Go, replace `launchApp` with `openLink: ${PROJECT_URL}` and bump
# the timeout to 120000ms — cold bundle compile can take 60-120s on first
# run. See the Expo Go section of references/writing-flows.md.

- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: ".*${HOME_SCREEN_TEXT}.*"
    timeout: 30000
- takeScreenshot: app-launch
